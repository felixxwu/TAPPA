name: Release

# Single release pipeline triggered on every push to main. One shared
# verify-caches gate, then all export/publish targets run in parallel:
#   - export-web      -> itch.io (html5)
#   - export-android  -> itch.io (sideloadable .apk)
#   - export-windows  -> itch.io (.exe)
#   - publish-play    -> Google Play Console (.aab)
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   BUTLER_API_KEY             - itch.io butler API key (web/android/windows)
#   ANDROID_KEYSTORE_B64       - base64 of the upload keystore (android + play)
#   ANDROID_KEYSTORE_PASSWORD  - that keystore's password
#   PLAY_SERVICE_ACCOUNT_JSON  - full contents of the GCP service-account JSON key
#
# NOTE ON THE FIRST PLAY RELEASE: the Play Developer API refuses the very first
# upload for a brand-new app. You must upload one build by hand in the Play
# Console before publish-play will succeed. Also, new *personal* developer
# accounts must complete a closed test (12+ testers, 14 days) before production
# access is granted — until then keep TRACK at "internal" or "alpha".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # Pinned to 4.6.3 to match the local editor and guarantee the Android build
  # template compiles against and targets API level 36 (Android 16) — Google
  # Play requires target API >= 36 for updates from Aug 31, 2026.
  GODOT_VERSION: "4.6.3"
  ITCH_USER: felixxwu        # <-- your itch.io username
  ITCH_GAME: tappa           # itch.io game slug -> https://felixxwu.itch.io/tappa
  EXPORT_DIR: build/web
  PACKAGE_NAME: tappa.game
  # Play track to publish to:
  #   internal   - internal testing (<=100 testers, instant)
  #   alpha      - closed testing (invite-only groups)
  #   beta       - open testing (anyone with the opt-in link)
  #   production - public on the store
  TRACK: alpha

jobs:
  verify-caches:
    name: Verify track + opponent lockfiles are fresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project (build resource cache)
        run: godot --headless --import --quit || true

      - name: Verify track lockfile is fresh (hash check, no regeneration)
        run: godot --headless --path . res://tools/verify_track_cache.tscn

      - name: Verify opponent lockfile is fresh (hash check, no regeneration)
        run: godot --headless --path . res://tools/verify_opponent_cache.tscn

  export-web:
    name: Export & deploy web build
    runs-on: ubuntu-latest
    needs: verify-caches
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so build_web.sh can derive the version from the real
          # commit count (0.<count>). The default shallow clone (depth 1) would
          # make every deploy report 0.1.
          fetch-depth: 0

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless) + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Import project (build resource cache)
        run: godot --headless --import --quit || true

      - name: Export web build (via build_web.sh)
        env:
          GODOT: /usr/local/bin/godot
        run: |
          set -euo pipefail
          ./build_web.sh
          ls -la build/web

      - name: Install butler
        run: |
          set -euo pipefail
          # itch serves butler from broth; the .ovh host has intermittent DNS
          # issues on CI, so retry and fall back to the .zone mirror.
          fetch() {
            curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
              -o butler.zip "$1/butler/linux-amd64/LATEST/archive/default"
          }
          fetch https://broth.itch.ovh || fetch https://broth.itch.zone
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push "${EXPORT_DIR}" "${ITCH_USER}/${ITCH_GAME}:html5"

  export-android:
    name: Export & deploy Android APK
    runs-on: ubuntu-latest
    needs: verify-caches
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history: build_android.sh derives the version name AND the
          # Android versionCode from the commit count.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless) + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Point Godot at the runner's Android SDK + JDK
        run: |
          set -euo pipefail
          # The Ubuntu runner ships an Android SDK at $ANDROID_HOME; Godot reads
          # the SDK/JDK locations from its editor settings, so write them there.
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-${GODOT_VERSION}.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          EOF

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          # Prefer a persistent keystore from repo secrets so every APK carries
          # the same signature (required for install-over-update on devices).
          # Fall back to an ephemeral keystore so the pipeline still works
          # before the secrets exist — but warn, because a changing signature
          # forces players to uninstall before updating.
          if [[ -n "${ANDROID_KEYSTORE_B64}" ]]; then
            echo "${ANDROID_KEYSTORE_B64}" | base64 -d > release.keystore
            PASS="${ANDROID_KEYSTORE_PASSWORD}"
          else
            echo "::warning::No ANDROID_KEYSTORE_B64 secret — signing with an ephemeral keystore (APK signature changes every build)"
            PASS="ephemeral-$(date +%s)"
            keytool -genkeypair -keystore release.keystore -alias rally \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=rally, O=felixxwu"
          fi
          {
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$PWD/release.keystore"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=rally"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$PASS"
          } >> "$GITHUB_ENV"

      - name: Import project (build resource cache)
        run: godot --headless --import --quit || true

      - name: Export Android APK (via build_android.sh)
        env:
          GODOT: /usr/local/bin/godot
        run: |
          set -euo pipefail
          ./build_android.sh
          ls -la build/android

      - name: Install butler
        run: |
          set -euo pipefail
          fetch() {
            curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
              -o butler.zip "$1/butler/linux-amd64/LATEST/archive/default"
          }
          fetch https://broth.itch.ovh || fetch https://broth.itch.zone
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push build/android/tappa.apk "${ITCH_USER}/${ITCH_GAME}:android"

  export-windows:
    name: Export & deploy Windows .exe
    runs-on: ubuntu-latest
    needs: verify-caches
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so build_windows.sh can derive the version from the
          # real commit count (0.<count>).
          fetch-depth: 0

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless) + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Import project (build resource cache)
        run: godot --headless --import --quit || true

      - name: Export Windows .exe (via build_windows.sh)
        env:
          GODOT: /usr/local/bin/godot
        run: |
          set -euo pipefail
          ./build_windows.sh
          ls -la build/windows

      - name: Install butler
        run: |
          set -euo pipefail
          fetch() {
            curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
              -o butler.zip "$1/butler/linux-amd64/LATEST/archive/default"
          }
          fetch https://broth.itch.ovh || fetch https://broth.itch.zone
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push build/windows/tappa.exe "${ITCH_USER}/${ITCH_GAME}:windows"

  publish-play:
    name: Build AAB & upload to Play
    runs-on: ubuntu-latest
    needs: verify-caches
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so build_android_play.sh can derive the version name
          # and the monotonic Android versionCode from the commit count.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless) + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Point Godot at the runner's Android SDK + JDK
        run: |
          set -euo pipefail
          # The Ubuntu runner ships an Android SDK at $ANDROID_HOME; Godot reads
          # the SDK/JDK locations from its editor settings, so write them there.
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-${GODOT_VERSION}.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          EOF

      - name: Install the Godot Android build template (required for AAB/Gradle)
        run: |
          set -euo pipefail
          # An AAB export uses use_gradle_build=true, which needs the Android
          # build template installed into the project at res://android/build.
          # The template ships inside the export-templates archive as
          # android_source.zip; extracting it into android/build is exactly what
          # the editor's "Install Android Build Template" menu item does.
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p android/build
          unzip -q -o "${TPL_DIR}/android_source.zip" -d android/build
          # Godot checks this version stamp matches the engine version.
          echo "${GODOT_VERSION}.stable" > android/.build_version
          ls android/build | head

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          # The upload keystore must be a real, persistent keystore for Play:
          # Play App Signing verifies every upload against the same upload key.
          # (Unlike the itch APK job, we do NOT fall back to an ephemeral
          # keystore — a changing signature would be rejected by Play.)
          if [[ -z "${ANDROID_KEYSTORE_B64}" ]]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is missing — Play requires a stable upload keystore."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_B64}" | base64 -d > upload.keystore
          {
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$PWD/upload.keystore"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=rally"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
          } >> "$GITHUB_ENV"

      - name: Import project (build resource cache)
        run: godot --headless --import --quit || true

      - name: Export Android App Bundle (via build_android_play.sh)
        env:
          GODOT: /usr/local/bin/godot
        run: |
          set -euo pipefail
          ./build_android_play.sh
          ls -la build/android-play

      - name: Upload the .aab as a workflow artifact
        # Captured before the Play upload so you can grab the bundle even when
        # that step fails — e.g. the first-ever release, which must be uploaded
        # to the Play Console by hand before the API will accept anything.
        uses: actions/upload-artifact@v6
        with:
          name: rally-aab
          path: build/android-play/rally.aab
          if-no-files-found: error

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/android-play/rally.aab
          tracks: ${{ env.TRACK }}
          status: completed

  deploy-pages:
    name: Deploy /docs to GitHub Pages
    runs-on: ubuntu-latest
    # No build step needed — we publish the static /docs folder as-is, the same
    # content GitHub's legacy Pages build used to serve. This replaces that
    # automatic "pages-build-deployment" run so everything lives in one workflow.
    # Requires the repo's Pages source to be set to "GitHub Actions"
    # (Settings -> Pages -> Build and deployment -> Source).
    permissions:
      contents: read
      pages: write
      id-token: write
    # Serialize Pages deploys; never cancel an in-flight one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload /docs as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
