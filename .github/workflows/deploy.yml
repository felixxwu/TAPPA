name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  GODOT_VERSION: "4.6"
  ITCH_USER: felixxwu        # <-- your itch.io username
  ITCH_GAME: rally           # itch.io game slug -> https://felixxwu.itch.io/rally
  EXPORT_DIR: rally/build/web

jobs:
  export-web:
    name: Export & deploy web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless) + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Import project (build resource cache)
        working-directory: rally
        run: godot --headless --import --quit || true

      - name: Export web build (via build_web.sh)
        working-directory: rally
        env:
          GODOT: /usr/local/bin/godot
        run: |
          set -euo pipefail
          ./build_web.sh
          ls -la build/web

      - name: Install butler
        run: |
          set -euo pipefail
          # itch serves butler from broth; the .ovh host has intermittent DNS
          # issues on CI, so retry and fall back to the .zone mirror.
          fetch() {
            curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 \
              -o butler.zip "$1/butler/linux-amd64/LATEST/archive/default"
          }
          fetch https://broth.itch.ovh || fetch https://broth.itch.zone
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push "${EXPORT_DIR}" "${ITCH_USER}/${ITCH_GAME}:html5"
